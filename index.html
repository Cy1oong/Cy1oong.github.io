<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cy1oong</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #eef8ff 0%, #dbefff 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "Helvetica Neue", Arial, sans-serif;
      color: #111;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 1000px;
    }

    .eyebrow {
      margin: 0 0 18px;
      font-size: 22px;
      font-weight: 600;
      color: #4a6fa5;
      letter-spacing: -0.02em;
    }

    .headline {
      margin: 0;
      font-size: clamp(64px, 11vw, 128px);
      font-weight: 800;
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .subheadline {
      margin: 24px auto 0;
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 500;
      line-height: 1.35;
      color: #3a3a3c;
      max-width: 760px;
    }

    .notice {
      margin: 18px auto 0;
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 400;
      line-height: 1.5;
      color: #6e6e73;
      max-width: 760px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="eyebrow">:)</p>
    <h1 class="headline">Good to see you.</h1>
    <p class="subheadline">Built by Cy1oong with simplicity, clarity, and a little bit of style.</p>
    <p class="notice">This homepage is under construction and will be online soon.</p>
  </div>
</body>
</html>
